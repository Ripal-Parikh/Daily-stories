<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌟 Daily Story Collection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #fffdf5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #d4760a, #f0a500);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 { font-size: 28px; margin-bottom: 6px; }
    header p  { font-size: 14px; opacity: 0.9; }

    .filters {
      padding: 20px;
      text-align: center;
      background: #fff8ee;
      border-bottom: 1px solid #f0e0c0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .filters h3 {
      margin-bottom: 12px;
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 8px;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid #d4760a;
      background: white;
      color: #d4760a;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #d4760a;
      color: white;
    }

    .search-box {
      margin-top: 12px;
    }

    .search-box input {
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid #f0e0c0;
      font-size: 14px;
      width: 280px;
      outline: none;
    }

    .search-box input:focus {
      border-color: #d4760a;
    }

    .stats {
      text-align: center;
      padding: 12px;
      font-size: 13px;
      color: #aaa;
    }

    .stories-grid {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .story-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border-left: 4px solid #d4760a;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .story-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .story-meta {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge-category {
      background: #fff0d6;
      color: #d4760a;
    }

    .badge-topic {
      background: #f0f0ff;
      color: #6666cc;
    }

    .badge-date {
      background: #f0f5f0;
      color: #669966;
      margin-left: auto;
    }

    .story-title {
      font-size: 20px;
      color: #333;
      margin-bottom: 10px;
    }

    .story-preview {
      font-size: 14px;
      color: #777;
      line-height: 1.7;
    }

    .read-more {
      margin-top: 10px;
      font-size: 13px;
      color: #d4760a;
      font-weight: bold;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      overflow-y: auto;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #fffdf5;
      border-radius: 16px;
      max-width: 680px;
      width: 100%;
      margin: auto;
      padding: 36px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      font-size: 24px;
      cursor: pointer;
      color: #aaa;
      background: none;
      border: none;
    }

    .modal-close:hover { color: #333; }

    .modal-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 24px;
      color: #d4760a;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .modal-story {
      font-size: 17px;
      line-height: 2;
      color: #444;
      white-space: pre-wrap;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 16px;
    }

    /* Category colors */
    .cat-Leaders     { border-left-color: #e05a00; }
    .cat-Mythology   { border-left-color: #9933cc; }
    .cat-Ramayana    { border-left-color: #0077cc; }
    .cat-Mahabharata { border-left-color: #cc6600; }
    .cat-Life-Lessons{ border-left-color: #339933; }
  </style>
</head>
<body>

<header>
  <h1>🌟 Daily Story Collection</h1>
  <p>Inspiring stories for your little one ❤️</p>
</header>

<div class="filters">
  <h3>Filter by Category</h3>
  <div class="filter-group" id="categoryFilters"></div>
  <div class="filter-group" id="topicFilters"></div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Search stories..." oninput="applyFilters()">
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="stories-grid" id="storiesGrid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-story" id="modalStory"></div>
  </div>
</div>

<script>
  let allStories = [];
  let activeCategory = "All";
  let activeTopic = "All";

  async function loadStories() {
    try {
      const res = await fetch("stories.json?t=" + Date.now());
      allStories = await res.json();
      buildFilters();
      applyFilters();
    } catch (e) {
      document.getElementById("storiesGrid").innerHTML =
        '<div class="empty">📖 No stories yet! Run the GitHub Action to generate your first story.</div>';
    }
  }

  function buildFilters() {
    const categories = ["All", ...new Set(allStories.map(s => s.category))];
    const topics     = ["All", ...new Set(allStories.map(s => s.topic))];

    document.getElementById("categoryFilters").innerHTML =
      categories.map(c =>
        `<button class="filter-btn ${c === 'All' ? 'active' : ''}"
          onclick="setCategory('${c}')" id="cat-${c}">${c}</button>`
      ).join("");

    document.getElementById("topicFilters").innerHTML =
      topics.map(t =>
        `<button class="filter-btn"
          onclick="setTopic('${t}')" id="top-${t}">${t}</button>`
      ).join("");
  }

  function setCategory(cat) {
    activeCategory = cat;
    activeTopic = "All";
    document.querySelectorAll("#categoryFilters .filter-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll("#topicFilters .filter-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("cat-" + cat).classList.add("active");
    const topAll = document.getElementById("top-All");
    if (topAll) topAll.classList.add("active");
    applyFilters();
  }

  function setTopic(topic) {
    activeTopic = topic;
    document.querySelectorAll("#topicFilters .filter-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("top-" + topic).classList.add("active");
    applyFilters();
  }

  function applyFilters() {
    const search = document.getElementById("searchInput").value.toLowerCase();

    let filtered = allStories.filter(s => {
      const matchCat   = activeCategory === "All" || s.category === activeCategory;
      const matchTopic = activeTopic === "All" || s.topic === activeTopic;
      const matchSearch = !search ||
        s.title.toLowerCase().includes(search) ||
        s.story.toLowerCase().includes(search) ||
        s.topic.toLowerCase().includes(search);
      return matchCat && matchTopic && matchSearch;
    });

    document.getElementById("stats").textContent =
      `Showing ${filtered.length} of ${allStories.length} stories`;

    const grid = document.getElementById("storiesGrid");

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">😔 No stories found. Try a different filter!</div>';
      return;
    }

    grid.innerHTML = filtered.map((s, i) => {
      const preview = s.story.replace(/\n/g, " ").slice(0, 160) + "...";
      const catClass = "cat-" + s.category.replace(/\s+/g, "-");
      return `
        <div class="story-card ${catClass}" onclick="openStory(${allStories.indexOf(s)})">
          <div class="story-meta">
            <span class="badge badge-category">${s.category}</span>
            <span class="badge badge-topic">${s.topic}</span>
            <span class="badge badge-date">${s.date}</span>
          </div>
          <div class="story-title">${s.title}</div>
          <div class="story-preview">${preview}</div>
          <div class="read-more">Read full story →</div>
        </div>`;
    }).join("");
  }

  function openStory(index) {
    const s = allStories[index];
    document.getElementById("modalMeta").innerHTML = `
      <span class="badge badge-category">${s.category}</span>
      <span class="badge badge-topic">${s.topic}</span>
      <span class="badge badge-date">${s.date}</span>`;
    document.getElementById("modalTitle").textContent = s.title;
    document.getElementById("modalStory").textContent = s.story;
    document.getElementById("modalOverlay").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal(e) {
    if (e.target === document.getElementById("modalOverlay")) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById("modalOverlay").classList.remove("open");
    document.body.style.overflow = "";
  }

  loadStories();
</script>
</body>
</html>
